# ============================================================================
# Claude Code — Automated PR Review
# ============================================================================
# Runs automatically on every PR. Read-only review focused on pipeline
# correctness, Firewalla appliance safety, and bash quality.
# ============================================================================

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. The PR branch is already checked out.

            This repository is a log-shipping pipeline running on a Firewalla
            Gold SE network appliance. Scripts deploy via SSH to a production
            device protecting a home network. Focus your review on:

            1. **Bash correctness** — quoting bugs, unset variable references,
               broken conditionals, incorrect exit codes, non-portable syntax
            2. **Appliance safety** — changes that could break network
               connectivity, consume excessive RAM (50 MB budget), fill tmpfs,
               or survive firmware updates (all persistent files must be under
               /home/pi/.firewalla/config/)
            3. **Secret handling** — API tokens must come from .env/environment
               variables, never hardcoded; .env must stay in .gitignore
            4. **Fluent Bit config** — if .conf files changed: valid INI syntax,
               correct tag routing, buffer/memory limits, Axiom output config
            5. **Dependency creep** — only bash, docker, curl, redis-cli, ssh
               are available on the Firewalla; flag anything else
            6. **deploy.sh safety** — this runs over SSH on a live appliance;
               flag destructive operations or missing error handling

            Rules:
            - Only comment on actual problems or meaningful improvements
            - Do NOT comment on style, formatting, or naming preferences
            - Do NOT give positive feedback or praise — just flag issues
            - Do NOT propose inline fix code — describe the problem and why it
              matters, not the solution. Fixes go through a separate commit.
            - If nothing significant is wrong, say so in one sentence and move on

            Output format:
            - Read the full diff and any source files needed for context
            - Collect ALL findings before producing any output
            - Return a single consolidated review — do not post comments
              incrementally as you discover issues
          claude_args: |
            --max-turns 15
            --model haiku
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Read"
