# ============================================================================
# Claude Code — Automated PR Review
# ============================================================================
# Thin wrapper around PitziLabs/shared-workflows/claude-review.yml.
# The reusable workflow wraps this focus block with the standard
# PR-context header, common rules, and output-format scaffolding.
# Pinned to Haiku.
# ============================================================================

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: PitziLabs/shared-workflows/.github/workflows/claude-review.yml@main
    secrets: inherit
    with:
      review_prompt: |
        This repository is a log-shipping pipeline running on a Firewalla
        Gold SE network appliance. Scripts deploy via SSH to a production
        device protecting a home network. Focus your review on:

        1. **Bash correctness** — quoting bugs, unset variable references,
           broken conditionals, incorrect exit codes, non-portable syntax
        2. **Appliance safety** — changes that could break network
           connectivity, consume excessive RAM (50 MB budget), fill tmpfs,
           or survive firmware updates (all persistent files must be under
           /home/pi/.firewalla/config/)
        3. **Secret handling** — API tokens must come from .env/environment
           variables, never hardcoded; .env must stay in .gitignore
        4. **Fluent Bit config** — if .conf files changed: valid INI syntax,
           correct tag routing, buffer/memory limits, Axiom output config
        5. **Dependency creep** — only bash, docker, curl, redis-cli, ssh
           are available on the Firewalla; flag anything else
        6. **deploy.sh safety** — this runs over SSH on a live appliance;
           flag destructive operations or missing error handling
