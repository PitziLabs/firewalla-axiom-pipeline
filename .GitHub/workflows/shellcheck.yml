# ============================================================================
# ShellCheck — Static Analysis for Pipeline Scripts
# ============================================================================
# Runs ShellCheck against all bash scripts on every PR.
# Required status check for branch protection / auto-merge.
# ============================================================================

name: ShellCheck

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  shellcheck:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          echo "ShellCheck version: $(shellcheck --version | head -2 | tail -1)"
          echo ""

          SCRIPTS=(
            deploy.sh
            scripts/start_log_shipping.sh
            scripts/device_lookup_export.sh
          )

          FAILED=0
          for script in "${SCRIPTS[@]}"; do
            if [[ -f "$script" ]]; then
              echo "━━━ Checking $script ━━━"
              if shellcheck --severity=warning --shell=bash "$script"; then
                echo "✓ $script passed"
              else
                FAILED=1
                echo "✗ $script has issues"
              fi
              echo ""
            else
              echo "⚠ $script not found (skipping)"
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::ShellCheck found issues in one or more scripts."
            exit 1
          fi

          echo "All scripts passed ShellCheck."
