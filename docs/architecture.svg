<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .arr { stroke: #73726c; stroke-width: 1.5; }

  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > text.th { fill: #085041; }
  .c-teal > text.ts { fill: #0F6E56; }

  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text.th { fill: #3C3489; }
  .c-purple > text.ts { fill: #534AB7; }

  .c-blue > rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text.th { fill: #0C447C; }
  .c-blue > text.ts { fill: #185FA5; }

  .c-green > rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green > text.th { fill: #27500A; }
  .c-green > text.ts { fill: #3B6D11; }

  .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > text.th { fill: #633806; }
  .c-amber > text.ts { fill: #854F0B; }

  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text.th { fill: #712B13; }
  .c-coral > text.ts { fill: #993C1D; }

  .c-pink > rect { fill: #FBEAF0; stroke: #993556; }
  .c-pink > text.th { fill: #72243E; }
  .c-pink > text.ts { fill: #993556; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Firewalla hardware boundary -->
<g class="c-teal">
  <rect x="30" y="20" width="620" height="520" rx="20" stroke-width="0.5"/>
  <text class="th" x="340" y="46" text-anchor="middle">Firewalla Gold SE (192.168.139.1)</text>
  <text class="ts" x="340" y="64" text-anchor="middle">ARM64 · 4 GB RAM · 32 GB eMMC · Debian</text>
</g>

<!-- Data sources -->
<g class="c-purple">
  <rect x="50" y="84" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="137" y="102" text-anchor="middle" dominant-baseline="central">Zeek IDS</text>
  <text class="ts" x="137" y="120" text-anchor="middle" dominant-baseline="central">/bspool/manager/dns.log</text>
  <text class="ts" x="137" y="138" text-anchor="middle" dominant-baseline="central">/bspool/manager/conn.log</text>
</g>

<g class="c-purple">
  <rect x="252" y="84" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central">Redis (localhost:6379)</text>
  <text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central">host:mac:* keys</text>
  <text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central">bname, ipv4Addr, mac</text>
</g>

<g class="c-purple">
  <rect x="454" y="84" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="541" y="102" text-anchor="middle" dominant-baseline="central">ACL alarm log</text>
  <text class="ts" x="541" y="120" text-anchor="middle" dominant-baseline="central">/alog/acl-alarm.log</text>
  <text class="ts" x="541" y="138" text-anchor="middle" dominant-baseline="central">Blocked connections</text>
</g>

<!-- Processors -->
<g class="c-blue">
  <rect x="50" y="216" width="230" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="165" y="236" text-anchor="middle" dominant-baseline="central">Fluent Bit (Docker)</text>
  <text class="ts" x="165" y="254" text-anchor="middle" dominant-baseline="central">fluent/fluent-bit:latest</text>
  <text class="ts" x="165" y="272" text-anchor="middle" dominant-baseline="central">~/.firewalla/config/fluent-bit.conf</text>
  <text class="ts" x="165" y="286" text-anchor="middle" dominant-baseline="central">--network host --restart always</text>
</g>

<g class="c-blue">
  <rect x="310" y="216" width="320" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="470" y="236" text-anchor="middle" dominant-baseline="central">Device export</text>
  <text class="ts" x="470" y="254" text-anchor="middle" dominant-baseline="central">~/.firewalla/config/device_lookup_export.sh</text>
  <text class="ts" x="470" y="272" text-anchor="middle" dominant-baseline="central">Cron: 0 * * * * (hourly)</text>
  <text class="ts" x="470" y="286" text-anchor="middle" dominant-baseline="central">Merges Redis inventory + group mapping</text>
</g>

<!-- Source → Processor arrows -->
<line x1="137" y1="152" x2="137" y2="214" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="152" x2="470" y2="214" class="arr" marker-end="url(#arrow)"/>
<line x1="541" y1="152" x2="220" y2="214" class="arr" marker-end="url(#arrow)"/>

<!-- Self-healing + config -->
<g class="c-green">
  <rect x="50" y="360" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="137" y="378" text-anchor="middle" dominant-baseline="central">Health check</text>
  <text class="ts" x="137" y="396" text-anchor="middle" dominant-baseline="central">fluent_bit_healthcheck.sh</text>
  <text class="ts" x="137" y="414" text-anchor="middle" dominant-baseline="central">Cron: */5 * * * *</text>
</g>

<g class="c-green">
  <rect x="250" y="360" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="337" y="378" text-anchor="middle" dominant-baseline="central">tmpfs cleanup</text>
  <text class="ts" x="337" y="396" text-anchor="middle" dominant-baseline="central">/bspool 30 MB ramdisk</text>
  <text class="ts" x="337" y="414" text-anchor="middle" dominant-baseline="central">Cron: */5 * * * *</text>
</g>

<g class="c-amber">
  <rect x="450" y="360" width="180" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="540" y="378" text-anchor="middle" dominant-baseline="central">device_groups.json</text>
  <text class="ts" x="540" y="396" text-anchor="middle" dominant-baseline="central">~/.firewalla/config/</text>
  <text class="ts" x="540" y="414" text-anchor="middle" dominant-baseline="central">91 devices · 9 groups</text>
</g>

<!-- Self-healing dashed arrows -->
<line x1="137" y1="360" x2="150" y2="298" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<line x1="337" y1="360" x2="120" y2="298" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<line x1="540" y1="360" x2="500" y2="298" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<!-- Persistence note -->
<text class="ts" x="340" y="452" text-anchor="middle">All configs persist at /home/pi/.firewalla/config/ · Startup via post_main.d/start_log_shipping.sh</text>

<!-- Network boundary -->
<line x1="60" y1="560" x2="620" y2="560" stroke="#73726c" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="580" text-anchor="middle">HTTPS outbound to api.axiom.co:443 — no inbound ports</text>

<!-- Axiom cloud -->
<g class="c-coral">
  <rect x="30" y="596" width="620" height="178" rx="20" stroke-width="0.5"/>
  <text class="th" x="340" y="618" text-anchor="middle">Axiom cloud (free tier)</text>
  <text class="ts" x="340" y="636" text-anchor="middle">app.axiom.co · 500 GB/month · 30-day retention · $0/month</text>
</g>

<g class="c-pink">
  <rect x="50" y="654" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="137" y="672" text-anchor="middle" dominant-baseline="central">cjp-firewalla</text>
  <text class="ts" x="137" y="690" text-anchor="middle" dominant-baseline="central">zeek_dns, zeek_conn</text>
  <text class="ts" x="137" y="708" text-anchor="middle" dominant-baseline="central">firewalla_acl</text>
</g>

<g class="c-pink">
  <rect x="252" y="654" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="672" text-anchor="middle" dominant-baseline="central">cjp-firewalla-devices</text>
  <text class="ts" x="340" y="690" text-anchor="middle" dominant-baseline="central">ipv4, mac (lowercase)</text>
  <text class="ts" x="340" y="708" text-anchor="middle" dominant-baseline="central">name, group</text>
</g>

<g class="c-pink">
  <rect x="454" y="654" width="175" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="541" y="672" text-anchor="middle" dominant-baseline="central">Dashboards</text>
  <text class="ts" x="541" y="690" text-anchor="middle" dominant-baseline="central">Network overview</text>
  <text class="ts" x="541" y="708" text-anchor="middle" dominant-baseline="central">DNS monitor</text>
</g>

<!-- Processor → Axiom arrows -->
<line x1="165" y1="296" x2="137" y2="652" class="arr" marker-end="url(#arrow)"/>
<line x1="470" y1="296" x2="340" y2="652" class="arr" marker-end="url(#arrow)"/>

<!-- Datasets → Dashboards -->
<line x1="227" y1="692" x2="452" y2="688" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<line x1="429" y1="690" x2="452" y2="688" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<!-- Legend -->
<text class="ts" x="50" y="806" text-anchor="start">Purple = data sources · Blue = shippers · Green = self-healing · Amber = config · Pink = cloud storage</text>
</svg>
